<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Comments Search</title>
    <style>
        /* ... (keep the existing styles) ... */
    </style>
</head>
<body>
    <div class="container">
        <h1>YouTube Comments Search</h1>
        <form id="searchForm">
            <input type="text" id="authorInput" placeholder='Filter by author (use quotes for exact match)...'>
            <input type="text" id="keywordInput" placeholder='Filter by keyword in message (use quotes for exact match)...'>
            <button type="submit">Search</button>
        </form>
        <div id="results"></div>
    </div>

    <script>
        let comments = [];

        // Load the JSON data
        fetch('data_chunk_1.json')
            .then(response => response.json())
            .then(data => {
                comments = data;
                console.log('Data loaded successfully');
                console.log('Number of comments loaded:', comments.length);
                console.log('First comment:', JSON.stringify(comments[0], null, 2));
            })
            .catch(error => console.error('Error loading the JSON data:', error));

        // Enhanced search function with exact and partial matching
        function searchComments(author, keyword) {
            console.log('Searching for author:', author, 'and keyword:', keyword);
            console.log('Total comments before filtering:', comments.length);
            
            const isExactAuthorMatch = /^".*"$/.test(author);
            const isExactKeywordMatch = /^".*"$/.test(keyword);
            
            author = author.replace(/^"|"$/g, '').trim().toLowerCase();
            keyword = keyword.replace(/^"|"$/g, '').trim().toLowerCase();

            const results = comments.filter(comment => {
                console.log('Processing comment:', JSON.stringify(comment, null, 2));
                
                let authorMatch = false;
                let keywordMatch = false;

                if (author) {
                    authorMatch = comment.author && (isExactAuthorMatch 
                        ? comment.author.toString().toLowerCase() === author
                        : comment.author.toString().toLowerCase().includes(author));
                    console.log('Author match:', authorMatch, 'for', comment.author);
                } else {
                    authorMatch = true;
                }

                if (keyword) {
                    keywordMatch = comment.message && (isExactKeywordMatch
                        ? comment.message.toString().toLowerCase() === keyword
                        : comment.message.toString().toLowerCase().includes(keyword));
                    console.log('Keyword match:', keywordMatch, 'for', comment.message);
                } else {
                    keywordMatch = true;
                }

                return authorMatch && keywordMatch;
            });

            console.log('Number of results:', results.length);
            return results;
        }

        // Display results (keep your existing function)
        function displayResults(results) {
            // ... (keep the existing displayResults function)
        }

        // Event listener for form submission
        document.getElementById('searchForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const author = document.getElementById('authorInput').value.trim();
            const keyword = document.getElementById('keywordInput').value.trim();
            console.log('Form submitted with author:', author, 'and keyword:', keyword);
            const results = searchComments(author, keyword);
            displayResults(results);
        });
    </script>
</body>
</html>
