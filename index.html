<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyboard Warriors Search</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f0f0f0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        #monkeyImage {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }
        h1, h2 {
            text-align: center;
            color: #333;
        }
        .input-row {
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin-right: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            padding: 8px 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        #results {
            margin-top: 20px;
        }
        .result-item {
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="monkey.png" alt="Monkey" id="monkeyImage">
        <h1>Keyboard Warriors</h1>
        <h2>Are you one? Search and find out!</h2>
        <div class="input-row">
            <input type="text" id="authorInput" placeholder="Search by author">
            <input type="text" id="messageInput" placeholder="Search in messages">
        </div>
        <div class="input-row">
            <select id="channelSelect">
                <option value="">All Channels</option>
            </select>
            <input type="date" id="fromDate">
            <input type="date" id="toDate">
        </div>
        <div class="input-row">
            <button onclick="search()">Search</button>
            <button onclick="clearResults()">Clear</button>
        </div>
        <div id="results"></div>
    </div>

    <script>
        const totalChunks = 258; // Update this with the total number of chunk files you have
        let allData = [];
        let isLoading = false;
        let channels = new Set();
    
        async function loadAllData() {
            if (isLoading) return;
            isLoading = true;
            document.getElementById('results').innerHTML = 'Loading data...';
    
            for (let i = 1; i <= totalChunks; i++) {
                try {
                    const response = await fetch(`processed_chunks/processed_data_chunk_${i}.json`);
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    const text = await response.text();
                    const data = JSON.parse(text.replace(/:\s*Infinity/g, ': null'));
                    allData = allData.concat(data);
                    data.forEach(item => {
                        if (item.channel) channels.add(item.channel);
                    });
                    console.log(`Loaded ${data.length} items from chunk ${i}`);
                } catch (error) {
                    console.error(`Error loading chunk ${i}:`, error);
                    // Continue to the next chunk
                }
            }
    
            populateChannelSelect();
            isLoading = false;
            document.getElementById('results').innerHTML = `Data loaded. ${allData.length} total items. Ready to search.`;
        }
    
        function populateChannelSelect() {
            const select = document.getElementById('channelSelect');
            channels.forEach(channel => {
                const option = document.createElement('option');
                option.value = channel;
                option.textContent = channel;
                select.appendChild(option);
            });
        }
    
        function search() {
            if (isLoading) {
                alert('Data is still loading. Please wait.');
                return;
            }
    
            const authorTerm = document.getElementById('authorInput').value.toLowerCase();
            const messageTerm = document.getElementById('messageInput').value.toLowerCase();
            const channelTerm = document.getElementById('channelSelect').value;
            const fromDate = document.getElementById('fromDate').value;
            const toDate = document.getElementById('toDate').value;
    
            console.log(`Filtering ${allData.length} total items`);
    
            const results = allData.filter(item => {
                return (authorTerm === '' || (item.author && item.author.toLowerCase().includes(authorTerm))) &&
                       (messageTerm === '' || (item.message && item.message.toLowerCase().includes(messageTerm))) &&
                       (channelTerm === '' || item.channel === channelTerm) &&
                       (fromDate === '' || (item.upload_date && item.upload_date >= fromDate)) &&
                       (toDate === '' || (item.upload_date && item.upload_date <= toDate));
            });
    
            console.log(`Found ${results.length} results`);
            displayResults(results);
        }
    
        function displayResults(results) {
            const resultsDiv = document.getElementById('results');
            if (results.length === 0) {
                resultsDiv.innerHTML = 'No results found.';
                return;
            }
    
            let html = `<h3>Search Results (${results.length} found):</h3>`;
            results.forEach(item => {
                html += `
                    <div class="result-item">
                        <p><strong>${escapeHtml(item.author || '')}</strong> (${escapeHtml(item.timestamp || '')})</p>
                        <p>Channel: ${escapeHtml(item.channel || '')}</p>
                        <p>Message: ${escapeHtml(item.message || '')}</p>
                        <p>Superchat Value: $${(item.superchat_value || 0).toFixed(2)}</p>
                    </div>
                `;
            });
    
            resultsDiv.innerHTML = html;
        }
    
        function clearResults() {
            document.getElementById('authorInput').value = '';
            document.getElementById('messageInput').value = '';
            document.getElementById('channelSelect').value = '';
            document.getElementById('fromDate').value = '';
            document.getElementById('toDate').value = '';
            document.getElementById('results').innerHTML = '';
        }
    
        function escapeHtml(unsafe) {
            if (typeof unsafe !== 'string') return '';
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }
    
        // Load data when the page loads
        window.onload = loadAllData;
    </script>
    
</body>
</html>
