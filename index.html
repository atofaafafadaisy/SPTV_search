<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Comments Search</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
        }
        #searchForm {
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
        }
        button {
            padding: 10px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .comment {
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
        }
        #pagination {
            margin-top: 20px;
            text-align: center;
        }
        #pagination button {
            margin: 0 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>YouTube Comments Search</h1>
        <form id="searchForm">
            <input type="text" id="authorInput" placeholder='Filter by author (use quotes for exact match)...'>
            <input type="text" id="keywordInput" placeholder='Filter by keyword in message (use quotes for exact match)...'>
            <button type="submit">Search</button>
        </form>
        <div id="results"></div>
        <div id="pagination"></div>
    </div>

    <script>
        let authorIndex = {};
        let keywordIndex = {};
        let dataChunks = {};
        let currentPage = 1;
        const pageSize = 10;
        let currentSearchParams = {};

        // Load initial index
        fetch('index.json')
            .then(response => response.json())
            .then(index => {
                authorIndex = index.authorIndex;
                keywordIndex = index.keywordIndex;
                console.log('Index loaded successfully');
            })
            .catch(error => console.error('Error loading the index:', error));

        async function loadAndIndexChunk(chunkId) {
            if (dataChunks[chunkId]) return;  // Already loaded

            try {
                const response = await fetch(`data_chunk_${chunkId}.json`);
                const data = await response.json();
                dataChunks[chunkId] = data;
                console.log(`Chunk ${chunkId} loaded successfully`);
            } catch (error) {
                console.error(`Error loading chunk ${chunkId}:`, error);
            }
        }

        async function searchComments(author, keyword, page = 1, pageSize = 10) {
            let results = [];

            const isExactAuthorMatch = /^".*"$/.test(author);
            const isExactKeywordMatch = /^".*"$/.test(keyword);
            
            author = author.replace(/^"|"$/g, '').trim().toLowerCase();
            keyword = keyword.replace(/^"|"$/g, '').trim().toLowerCase();

            if (author) {
                results = Object.keys(authorIndex)
                    .filter(key => isExactAuthorMatch ? key === author : key.includes(author))
                    .flatMap(key => authorIndex[key]);
            }

            if (keyword) {
                const keywordResults = Object.keys(keywordIndex)
                    .filter(key => isExactKeywordMatch ? key === keyword : key.includes(keyword))
                    .flatMap(key => keywordIndex[key]);
                
                results = author ? results.filter(r => 
                    keywordResults.some(kr => kr.chunkId === r.chunkId && kr.index === r.index)
                ) : keywordResults;
            }

            const startIndex = (page - 1) * pageSize;
            const paginatedResults = results.slice(startIndex, startIndex + pageSize);

            const comments = await Promise.all(paginatedResults.map(async r => {
                await loadAndIndexChunk(r.chunkId);
                return dataChunks[r.chunkId][r.index];
            }));

            return {
                comments,
                totalResults: results.length,
                currentPage: page,
                totalPages: Math.ceil(results.length / pageSize)
            };
        }

        function displayResults(comments) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            if (comments.length === 0) {
                resultsDiv.innerHTML = '<p>No results found.</p>';
                return;
            }

            comments.forEach(comment => {
                const commentDiv = document.createElement('div');
                commentDiv.className = 'comment';
                commentDiv.innerHTML = `
                    <p><strong>Author:</strong> ${comment.author || 'N/A'}</p>
                    <p><strong>Message:</strong> ${comment.message || 'N/A'}</p>
                    <p><strong>Timestamp:</strong> ${comment.timestamp || 'N/A'}</p>
                `;
                resultsDiv.appendChild(commentDiv);
            });
        }

        function updatePagination(currentPage, totalPages) {
            const paginationDiv = document.getElementById('pagination');
            paginationDiv.innerHTML = '';

            if (totalPages > 1) {
                if (currentPage > 1) {
                    const prevButton = document.createElement('button');
                    prevButton.textContent = 'Previous';
                    prevButton.onclick = () => changePage(currentPage - 1);
                    paginationDiv.appendChild(prevButton);
                }

                const pageInfo = document.createElement('span');
                pageInfo.textContent = `Page ${currentPage} of ${totalPages}`;
                paginationDiv.appendChild(pageInfo);

                if (currentPage < totalPages) {
                    const nextButton = document.createElement('button');
                    nextButton.textContent = 'Next';
                    nextButton.onclick = () => changePage(currentPage + 1);
                    paginationDiv.appendChild(nextButton);
                }
            }
        }

        async function changePage(newPage) {
            currentPage = newPage;
            const result = await searchComments(currentSearchParams.author, currentSearchParams.keyword, currentPage, pageSize);
            displayResults(result.comments);
            updatePagination(result.currentPage, result.totalPages);
        }

        // Event listener for form submission
        document.getElementById('searchForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const author = document.getElementById('authorInput').value.trim();
            const keyword = document.getElementById('keywordInput').value.trim();
            currentSearchParams = { author, keyword };
            currentPage = 1;
            const result = await searchComments(author, keyword, currentPage, pageSize);
            displayResults(result.comments);
            updatePagination(result.currentPage, result.totalPages);
        });
    </script>
</body>
</html>
