<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Comments Search</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        #searchForm {
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .input-row {
            display: flex;
            width: 100%;
            gap: 10px;
            margin-bottom: 10px;
        }
        input[type="text"], input[type="date"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .comment {
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
        }
        .comment p {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>YouTube Comments Search</h1>
        <form id="searchForm">
            <div class="input-row">
                <input type="text" id="authorInput" placeholder='Filter by author (use quotes for exact match)...'>
                <input type="text" id="keywordInput" placeholder='Filter by keyword in message (use quotes for exact match)...'>
            </div>
            <div class="input-row">
                <input type="date" id="startDateInput" placeholder="Start Date">
                <input type="date" id="endDateInput" placeholder="End Date">
                <button type="submit">Search</button>
            </div>
        </form>
        <div id="results"></div>
    </div>

    <script>
        let comments = [];

        // Load the JSON data
        fetch('data_chunk_1.json')
            .then(response => response.json())
            .then(data => {
                comments = data;
                console.log(`Data loaded successfully. Number of comments: ${comments.length}`);
            })
            .catch(error => console.error('Error loading the JSON data:', error));

        // Set default end date to today
        document.addEventListener('DOMContentLoaded', function() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('endDateInput').value = today;
        });

        // Enhanced search function with exact and partial matching, and date filtering
        function searchComments(author, keyword, startDate, endDate) {
            const isExactAuthorMatch = /^".*"$/.test(author);
            const isExactKeywordMatch = /^".*"$/.test(keyword);
            
            author = author.replace(/^"|"$/g, '').trim().toLowerCase();
            keyword = keyword.replace(/^"|"$/g, '').trim().toLowerCase();

            // Convert input dates to Date objects
            const start = startDate ? new Date(startDate) : null;
            const end = endDate ? new Date(endDate) : new Date(); // Use current date if end date is not provided

            const results = comments.filter(comment => {
                let authorMatch = true;
                let keywordMatch = true;
                let dateMatch = true;

                if (author) {
                    authorMatch = comment.author && (isExactAuthorMatch 
                        ? comment.author.toString().toLowerCase() === author
                        : comment.author.toString().toLowerCase().includes(author));
                }

                if (keyword) {
                    keywordMatch = comment.message && (isExactKeywordMatch
                        ? comment.message.toString().toLowerCase() === keyword
                        : comment.message.toString().toLowerCase().includes(keyword));
                }

                if (start || end) {
                    const commentDate = new Date(comment.timestamp);
                    dateMatch = (!start || commentDate >= start) && (!end || commentDate <= end);
                }

                return (author || keyword) ? (authorMatch && keywordMatch && dateMatch) : dateMatch;
            });

            // Remove duplicates
            const uniqueResults = Array.from(new Set(results.map(JSON.stringify))).map(JSON.parse);
            return uniqueResults;
        }

        // Display results
        function displayResults(results) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            if (results.length === 0) {
                resultsDiv.innerHTML = '<p>No results found.</p>';
                return;
            }

            results.forEach(comment => {
                const commentDiv = document.createElement('div');
                commentDiv.className = 'comment';
                commentDiv.innerHTML = `
                    <p><strong>Video Title:</strong> ${comment.video_title || 'N/A'}</p>
                    <p><strong>Upload Date:</strong> ${comment.upload_date || 'N/A'}</p>
                    <p><strong>Channel:</strong> ${comment.channel || 'N/A'}</p>
                    <p><strong>Author:</strong> ${comment.author || 'N/A'}</p>
                    <p><strong>Message:</strong> ${comment.message || 'N/A'}</p>
                    <p><strong>Timestamp:</strong> ${comment.timestamp || 'N/A'}</p>
                `;
                resultsDiv.appendChild(commentDiv);
            });

            resultsDiv.innerHTML += `<p><strong>Total unique results:</strong> ${results.length}</p>`;
        }

        // Event listener for form submission
        document.getElementById('searchForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const author = document.getElementById('authorInput').value.trim();
            const keyword = document.getElementById('keywordInput').value.trim();
            const startDate = document.getElementById('startDateInput').value;
            const endDate = document.getElementById('endDateInput').value;
            const results = searchComments(author, keyword, startDate, endDate);
            displayResults(results);
        });
    </script>
</body>
</html>
