<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Comments Search</title>
    <style>
        /* ... (keep the existing styles) ... */
    </style>
</head>
<body>
    <div class="container">
        <h1>YouTube Comments Search</h1>
        <form id="searchForm">
            <input type="text" id="authorInput" placeholder="Filter by author...">
            <input type="text" id="keywordInput" placeholder="Filter by keyword in message...">
            <button type="submit">Search</button>
        </form>
        <div id="results"></div>
    </div>

    <script>
        let comments = [];

        // Load the JSON data
        fetch('data_chunk_1.json')
            .then(response => response.json())
            .then(data => {
                comments = data;
                console.log('Data loaded successfully');
                console.log('Number of comments loaded:', comments.length);
                console.log('First comment:', comments[0]);
            })
            .catch(error => console.error('Error loading the JSON data:', error));

        // Improved search function with error handling
        function searchComments(author, keyword) {
            console.log('Searching for author:', author, 'and keyword:', keyword);
            const results = comments.filter(comment => {
                try {
                    const authorMatch = !author || (comment.Author && comment.Author.toString().toLowerCase().includes(author.toLowerCase()));
                    const keywordMatch = !keyword || (comment.Message && comment.Message.toString().toLowerCase().includes(keyword.toLowerCase()));
                    return authorMatch && keywordMatch;
                } catch (error) {
                    console.error('Error processing comment:', comment, error);
                    return false;
                }
            });
            console.log('Number of results:', results.length);
            return results;
        }

        // Display results
        function displayResults(results) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            if (results.length === 0) {
                resultsDiv.innerHTML = '<p>No results found.</p>';
                return;
            }

            results.forEach(comment => {
                const commentDiv = document.createElement('div');
                commentDiv.className = 'comment';
                commentDiv.innerHTML = `
                    <p><strong>Author:</strong> ${comment.Author || 'N/A'}</p>
                    <p><strong>Message:</strong> ${comment.Message || 'N/A'}</p>
                    <p><strong>Timestamp:</strong> ${comment.Timestamp || 'N/A'}</p>
                `;
                resultsDiv.appendChild(commentDiv);
            });
        }

        // Event listener for form submission
        document.getElementById('searchForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const author = document.getElementById('authorInput').value.trim();
            const keyword = document.getElementById('keywordInput').value.trim();
            console.log('Form submitted with author:', author, 'and keyword:', keyword);
            const results = searchComments(author, keyword);
            displayResults(results);
        });
    </script>
</body>
</html>
